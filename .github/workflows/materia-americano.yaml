name: materia-americano
on:
  push:
    branches:
      - main
    paths:
      - americano/**
      - .github/workflows/materia-americano.yaml
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Publish americano/ to the root of the 'americano' branch
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          tmp="$(mktemp -d)"
          cp -a "$GITHUB_WORKSPACE/americano/." "$tmp/"
          if git ls-remote --exit-code --heads origin americano >/dev/null 2>&1; then
            git checkout -B americano origin/americano
          else
            git checkout --orphan americano
          fi
          git rm -rfq . >/dev/null 2>&1 || true
          cp -a "$tmp/." .
          git add -A
          git diff --cached --quiet || git commit -q -m "sync americano/ from ${GITHUB_SHA}"
          git push origin americano
