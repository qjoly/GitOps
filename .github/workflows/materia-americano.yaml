name: materia-americano
on:
  push:
    branches:
      - main
    paths:
      - americano/**
      - .github/workflows/materia-americano.yaml
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Publish americano/ to the root of the 'americano' branch
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          cp -a "$GITHUB_WORKSPACE/americano/." "$tmp/"
          cd "$tmp"
          git init -q -b americano
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -q -m "sync americano/ from ${GITHUB_SHA}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" americano
