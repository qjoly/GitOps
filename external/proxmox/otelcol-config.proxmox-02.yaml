receivers:
  hostmetrics:
    collection_interval: 30s
    root_path: /
    scrapers:
      cpu: {}
      memory: {}
      load: {}
      disk: {}
      filesystem: {}
      network: {}
      paging: {}
processors:
  resourcedetection:
    detectors: [system]
    system:
      hostname_sources: [os]
  resource:
    attributes:
      - key: k8s.cluster.name
        value: proxmox-02
        action: upsert
  batch: {}
exporters:
  otlphttp:
    endpoint: https://signoz-ingest.mocha.thoughtless.eu
    tls:
      cert_file: /etc/otelcol/certs/client.crt
      key_file: /etc/otelcol/certs/client.key
service:
  telemetry:
    metrics:
      level: none
  pipelines:
    metrics:
      receivers: [hostmetrics]
      processors: [resourcedetection, resource, batch]
      exporters: [otlphttp]
