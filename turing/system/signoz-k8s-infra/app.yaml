apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: signoz-k8s-infra
  namespace: argocd
spec:
  project: default
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/audit: privileged
        pod-security.kubernetes.io/warn: privileged
  destination:
    server: https://kubernetes.default.svc
    namespace: signoz-k8s-infra
  source:
    repoURL: https://charts.signoz.io
    chart: k8s-infra
    targetRevision: 0.16.0
    helm:
      values: |
        global:
          clusterName: turing
          deploymentEnvironment: production
        otelCollectorEndpoint: https://signoz-ingest.mocha.thoughtless.eu
        otelInsecure: false
        presets:
          otlpExporter:
            enabled: true
          loggingExporter:
            enabled: false
        otelAgent:
          config:
            exporters:
              otlphttp:
                tls:
                  insecure: false
                  cert_file: /mtls/tls.crt
                  key_file: /mtls/tls.key
          extraVolumes:
            - name: mtls
              secret:
                secretName: signoz-mtls-client
          extraVolumeMounts:
            - name: mtls
              mountPath: /mtls
              readOnly: true
        otelDeployment:
          config:
            receivers:
              prometheus:
                config:
                  scrape_configs:
                    - job_name: argocd
                      scrape_interval: 30s
                      kubernetes_sd_configs:
                        - role: pod
                          namespaces:
                            names:
                              - argocd
                      relabel_configs:
                        - source_labels: [__meta_kubernetes_pod_container_port_name]
                          regex: metrics
                          action: keep
            processors:
              resource/cluster:
                attributes:
                  - key: cluster
                    value: turing
                    action: upsert
            exporters:
              otlphttp:
                tls:
                  insecure: false
                  cert_file: /mtls/tls.crt
                  key_file: /mtls/tls.key
            service:
              pipelines:
                metrics/argocd:
                  receivers:
                    - prometheus
                  processors:
                    - resource/cluster
                    - batch
                  exporters:
                    - otlphttp
          extraVolumes:
            - name: mtls
              secret:
                secretName: signoz-mtls-client
          extraVolumeMounts:
            - name: mtls
              mountPath: /mtls
              readOnly: true
