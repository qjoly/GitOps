apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: signoz-k8s-infra
  namespace: argocd
spec:
  project: default
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/audit: privileged
        pod-security.kubernetes.io/warn: privileged
  destination:
    server: https://kubernetes.default.svc
    namespace: signoz-k8s-infra
  source:
    repoURL: https://charts.signoz.io
    chart: k8s-infra
    targetRevision: 0.16.0
    helm:
      values: |
        global:
          clusterName: turing
          deploymentEnvironment: production
        otelCollectorEndpoint: https://signoz-ingest.mocha.thoughtless.eu
        otelInsecure: false
        otelTlsSecrets:
          enabled: true
          existingSecretName: signoz-mtls-client
        presets:
          otlpExporter:
            enabled: true
          loggingExporter:
            enabled: false
