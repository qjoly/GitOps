apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: signoz-mtls-selfsigned
  namespace: signoz-k8s-infra
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: signoz-mtls-ca
  namespace: signoz-k8s-infra
spec:
  isCA: true
  commonName: signoz-mtls-ca
  secretName: signoz-mtls-ca
  duration: 87600h
  renewBefore: 2160h
  privateKey:
    algorithm: RSA
    size: 4096
  issuerRef:
    name: signoz-mtls-selfsigned
    kind: Issuer
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: signoz-mtls-ca
  namespace: signoz-k8s-infra
spec:
  ca:
    secretName: signoz-mtls-ca
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: signoz-mtls-client
  namespace: signoz-k8s-infra
spec:
  commonName: turing
  secretName: signoz-mtls-client
  duration: 8760h
  renewBefore: 720h
  privateKey:
    algorithm: RSA
    size: 4096
  usages:
    - client auth
  issuerRef:
    name: signoz-mtls-ca
    kind: Issuer
