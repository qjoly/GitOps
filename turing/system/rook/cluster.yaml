apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rook-ceph-cluster
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://charts.rook.io/release
    chart: rook-ceph-cluster
    targetRevision: v1.20.1
    helm:
      values: |
        operatorNamespace: rook-ceph
        clusterName: turing
        toolbox:
          enabled: true
        monitoring:
          enabled: false
        cephClusterSpec:
          dataDirHostPath: /var/lib/rook
          mon:
            count: 3
            allowMultiplePerNode: false
          mgr:
            count: 2
            allowMultiplePerNode: false
            modules:
              - name: rook
                enabled: true
          dashboard:
            enabled: true
            ssl: false
          crashCollector:
            disable: false
          storage:
            useAllNodes: true
            useAllDevices: false
            deviceFilter: "^nvme0n1$"
          resources:
            mgr:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 1Gi
            mon:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 1Gi
            osd:
              requests:
                cpu: 500m
                memory: 2Gi
              limits:
                memory: 4Gi
          disruptionManagement:
            managePodBudgets: true
        cephBlockPools:
          - name: ceph-blockpool
            spec:
              failureDomain: host
              replicated:
                size: 3
            storageClass:
              enabled: true
              name: ceph-block
              isDefault: true
              reclaimPolicy: Delete
              allowVolumeExpansion: true
              parameters:
                imageFormat: "2"
                imageFeatures: layering
                csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
                csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph
                csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
                csi.storage.k8s.io/controller-expand-secret-namespace: rook-ceph
                csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
                csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph
                csi.storage.k8s.io/fstype: ext4
        cephFileSystems: []
        cephObjectStores: []
  destination:
    server: https://kubernetes.default.svc
    namespace: rook-ceph
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 10
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
  ignoreDifferences:
    - group: ceph.rook.io
      kind: CephCluster
      jsonPointers:
        - /spec/cephVersion
        - /spec/cleanupPolicy
        - /spec/continueUpgradeAfterChecksEvenIfNotHealthy
        - /spec/crashCollector
        - /spec/dashboard
        - /spec/healthCheck
        - /spec/monitoring
        - /spec/mgr
        - /spec/mon
        - /spec/resources
        - /spec/storage
