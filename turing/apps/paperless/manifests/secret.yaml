apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperless-db-credentials
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: paperless-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: paperless
        property: db_password
