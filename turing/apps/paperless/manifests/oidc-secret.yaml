# PAPERLESS_SECRET_KEY and the full PAPERLESS_SOCIALACCOUNT_PROVIDERS JSON
# (contains the Authentik client_id/secret) are stored in Vault and injected as
# env vars via envFrom in paperless.yaml. Same Vault-backed pattern as immich.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperless-oidc
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: paperless-oidc
    creationPolicy: Owner
  data:
    - secretKey: PAPERLESS_SECRET_KEY
      remoteRef:
        key: paperless
        property: secret_key
    - secretKey: PAPERLESS_SOCIALACCOUNT_PROVIDERS
      remoteRef:
        key: paperless
        property: socialaccount_providers
