---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: lvm-autoactivate
  namespace: openebs
  labels:
    app.kubernetes.io/name: lvm-autoactivate
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: lvm-autoactivate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lvm-autoactivate
    spec:
      priorityClassName: system-node-critical
      hostPID: true
      tolerations:
        - operator: Exists
      containers:
        - name: lvm-autoactivate
          image: openebs/lvm-driver:1.6.1
          command:
            - /bin/sh
            - -c
            - |
              set -o errexit
              while true; do
                vgchange -aay --refresh || true
                sleep 120
              done
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: device-dir
              mountPath: /dev
      volumes:
        - name: device-dir
          hostPath:
            path: /dev
            type: Directory
