apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: default
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  source:
    repoURL: https://traefik.github.io/charts
    targetRevision: 41.0.2
    chart: traefik
    helm:
      values: |
        accessLog:
          enabled: true
          format: json
        experimental:
          plugins:
            bouncer:
              moduleName: github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
              version: v1.6.0
        additionalArguments:
          - "--entrypoints.websecure.http.middlewares=traefik-crowdsec-bouncer@kubernetescrd"
        deployment:
          additionalVolumes:
            - name: crowdsec-bouncer-key
              secret:
                secretName: crowdsec-bouncer
                optional: true
        additionalVolumeMounts:
          - name: crowdsec-bouncer-key
            mountPath: /etc/traefik/crowdsec
            readOnly: true
        metrics:
          prometheus: null
          otlp:
            enabled: true
            addEntryPointsLabels: true
            addRoutersLabels: true
            addServicesLabels: true
            resourceAttributes:
              k8s.cluster.name: mocha
            http:
              enabled: true
              endpoint: http://signoz-otel-collector.signoz.svc.cluster.local:4318/v1/metrics
        service:
          annotations:
            lbipam.cilium.io/sharing-key: "public"
            lbipam.cilium.io/sharing-cross-namespace: "*"
        ports:
          websecure:
            transport:
              respondingTimeouts:
                readTimeout: 300
                writeTimeout: 300
                idleTimeout: 300
              lifeCycle:
                requestAcceptGraceTimeout: 300
                graceTimeOut: 300
              keepAliveMaxRequests: 100
              keepAliveMaxTime: 300