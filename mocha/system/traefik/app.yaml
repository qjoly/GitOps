apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
spec:
  project: default
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  source:
    repoURL: https://traefik.github.io/charts
    targetRevision: 41.0.1
    chart: traefik
    helm:
      values: |
        metrics:
          prometheus: null
          otlp:
            enabled: true
            addEntryPointsLabels: true
            addRoutersLabels: true
            addServicesLabels: true
            resourceAttributes:
              k8s.cluster.name: mocha
            http:
              enabled: true
              endpoint: http://signoz-otel-collector.signoz.svc.cluster.local:4318/v1/metrics
        service:
          annotations:
            lbipam.cilium.io/sharing-key: "public"
            lbipam.cilium.io/sharing-cross-namespace: "*"
        ports:
          websecure:
            transport:
              respondingTimeouts:
                readTimeout: 300
                writeTimeout: 300
                idleTimeout: 300
              lifeCycle:
                requestAcceptGraceTimeout: 300
                graceTimeOut: 300
              keepAliveMaxRequests: 100
              keepAliveMaxTime: 300