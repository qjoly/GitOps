apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
spec:
  project: default
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: authentik-postgresql
      jsonPointers:
        - /spec/persistentVolumeClaimRetentionPolicy
        - /spec/podManagementPolicy
        - /spec/revisionHistoryLimit
      jqPathExpressions:
        - '.spec.volumeClaimTemplates[].spec.volumeMode'
        - '.spec.volumeClaimTemplates[].status'
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  sources:
    - repoURL: https://charts.goauthentik.io
      chart: authentik
      targetRevision: 2026.5.5
      helm:
        values: |
          authentik:
            error_reporting:
              enabled: false
          global:
            env:
              - name: AUTHENTIK_SECRET_KEY
                valueFrom:
                  secretKeyRef:
                    name: authentik-secrets
                    key: AUTHENTIK_SECRET_KEY
              - name: AUTHENTIK_POSTGRESQL__PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: authentik-secrets
                    key: password
              # Bootstraps the akadmin API token; reused by authentik-provisioner.
              - name: AUTHENTIK_BOOTSTRAP_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: authentik-secrets
                    key: bootstrap-token
          server:
            ingress:
              enabled: true
              ingressClassName: traefik
              annotations:
                cert-manager.io/cluster-issuer: cloudflare
              hosts:
                - authentik.mocha.thoughtless.eu
              tls:
                - secretName: authentik-tls
                  hosts:
                    - authentik.mocha.thoughtless.eu
          postgresql:
            enabled: true
            auth:
              existingSecret: authentik-secrets
              secretKeys:
                userPasswordKey: password
                adminPasswordKey: postgres-password
            primary:
              persistence:
                enabled: true
                storageClass: openebs-lvmpv
                size: 8Gi
    - repoURL: https://github.com/qjoly/gitops.git
      targetRevision: HEAD
      path: mocha/system/authentik/manifests
    # authentik-provisioner: declaratively configures applications/providers.
    # Runs as an ArgoCD PostSync hook on every sync (idempotent).
    - repoURL: ghcr.io/qjoly/charts
      chart: authentik-provisioner
      targetRevision: 0.3.2
      helm:
        values: |
          authentik:
            url: http://authentik-server
            token:
              existingSecret: authentik-secrets
              key: bootstrap-token
          rbac:
            create: true
          job:
            helmHook: false
            argocdHook: PostSync
          config:
            managedBy: gitops-provisioner
            pruneGroups: false
            defaults:
              authorizationFlow: default-provider-authorization-implicit-consent
              invalidationFlow: default-provider-invalidation-flow
              subMode: user_email
            oauth2Providers:
              - slug: vaultwarden
                name: Provider for Vaultwarden
                appName: Vaultwarden
                clientType: confidential
                redirectURIs:
                  - https://vaultwarden.mocha.thoughtless.eu/identity/connect/oidc-signin
                scopes: [email, offline_access, profile, openid]
                subMode: user_email
                icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/vaultwarden.svg
              - slug: argocd-turing
                name: Provider for ArgoCD (turing)
                appName: ArgoCD Turing
                clientType: confidential
                redirectURIs:
                  - https://argocd-turing.thoughtless.eu/api/dex/callback
                scopes: [email, profile, openid]
                subMode: user_email
                icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/argo-cd.svg
                secretName: oidc-argocd-turing
            proxyProviders:
              - slug: prowlarr
                name: Prowlarr
                mode: forward_single
                externalHost: https://prowlarr.americano.thoughtless.eu
                accessTokenValidity: hours=24
                icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/prowlarr.svg
              - slug: radarr
                name: Radarr
                mode: forward_single
                externalHost: https://radarr.americano.thoughtless.eu
                accessTokenValidity: hours=24
                icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/radarr.svg
              - slug: sonarr
                name: Sonarr
                mode: forward_single
                externalHost: https://sonarr.americano.thoughtless.eu
                accessTokenValidity: hours=24
                icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/sonarr.svg
