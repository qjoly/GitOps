---
apiVersion: v1
kind: Secret
metadata:
  name: signoz-mtls-ca
  namespace: signoz
type: Opaque
data:
  tls.ca: 
---
apiVersion: traefik.io/v1alpha1
kind: TLSOption
metadata:
  name: mtls
  namespace: signoz
spec:
  clientAuth:
    secretNames:
      - signoz-mtls-ca
    clientAuthType: RequireAndVerifyClientCert
