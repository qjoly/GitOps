---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: discord-webhook
  namespace: signoz
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: discord-webhook
  data:
    - secretKey: webhook
      remoteRef:
        key: discord
        property: webhook
---
apiVersion: batch/v1
kind: Job
metadata:
  name: signoz-alerting-provisioner
  namespace: signoz
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: signoz-alerting-provisioner
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: provision
          image: python:3.12-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: SIGNOZ_API
              value: http://signoz.signoz.svc.cluster.local:8080
            - name: SIGNOZ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: signoz-api-key
                  key: api_key
            - name: DISCORD_WEBHOOK
              valueFrom:
                secretKeyRef:
                  name: discord-webhook
                  key: webhook
          command:
            - python
            - -c
            - |
              import os, json, urllib.request, urllib.error
              API = os.environ["SIGNOZ_API"].rstrip("/")
              H = {"SIGNOZ-API-KEY": os.environ["SIGNOZ_API_KEY"], "Content-Type": "application/json"}
              WEBHOOK = os.environ["DISCORD_WEBHOOK"]

              def call(method, path, data=None):
                  body = json.dumps(data).encode() if data is not None else None
                  req = urllib.request.Request(API + path, data=body, headers=H, method=method)
                  try:
                      with urllib.request.urlopen(req, timeout=20) as r:
                          return r.status, r.read().decode()
                  except urllib.error.HTTPError as e:
                      return e.code, e.read().decode()

              channel = {
                  "name": "discord",
                  "slack_configs": [{
                      "send_resolved": True,
                      "api_url": WEBHOOK,
                      "channel": "#alerts",
                      "title": "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}",
                      "text": "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}"
                  }]
              }
              _, body = call("GET", "/api/v1/channels")
              chans = json.loads(body).get("data") or []
              ex = next((c for c in chans if c.get("name") == "discord"), None)
              if ex:
                  cid = ex.get("id")
                  cs, rb = call("PUT", "/api/v1/channels/" + str(cid), channel)
                  print("channel updated:", cs, rb[:200])
              else:
                  cs, rb = call("POST", "/api/v1/channels", channel)
                  print("channel created:", cs, rb[:200])

              rules = [{
                  "version": "v5",
                  "alert": "ArgoCD applications OutOfSync",
                  "alertType": "METRIC_BASED_ALERT",
                  "ruleType": "threshold_rule",
                  "evalWindow": "5m0s",
                  "frequency": "1m0s",
                  "condition": {
                      "compositeQuery": {
                          "queryType": "builder",
                          "panelType": "graph",
                          "queries": [{
                              "type": "builder_query",
                              "spec": {
                                  "name": "A", "signal": "metrics", "disabled": False,
                                  "aggregations": [{"metricName": "argocd_app_info", "timeAggregation": "count", "spaceAggregation": "sum"}],
                                  "filter": {"expression": "sync_status = 'OutOfSync'"},
                                  "groupBy": []
                              }
                          }]
                      },
                      "op": ">", "target": 0, "matchType": "1", "selectedQueryName": "A"
                  },
                  "labels": {"severity": "warning"},
                  "annotations": {"summary": "ArgoCD has out-of-sync applications",
                                  "description": "One or more ArgoCD applications are OutOfSync on cluster {{$labels.cluster}}."},
                  "preferredChannels": ["discord"]
              }]
              _, rbody = call("GET", "/api/v1/rules")
              existing = {}
              for r in (json.loads(rbody).get("data", {}).get("rules") or []):
                  existing[r.get("alert") or (r.get("data") or {}).get("alert")] = r.get("id")
              for rule in rules:
                  rid = existing.get(rule["alert"])
                  if rid:
                      rs, rr = call("PUT", "/api/v1/rules/" + str(rid), rule)
                      print("rule updated:", rule["alert"], rs, rr[:250])
                  else:
                      rs, rr = call("POST", "/api/v1/rules", rule)
                      print("rule created:", rule["alert"], rs, rr[:250])
              raise SystemExit(0 if cs < 300 else 1)
