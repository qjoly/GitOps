---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: discord-webhook
  namespace: signoz
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: discord-webhook
  data:
    - secretKey: webhook
      remoteRef:
        key: discord
        property: webhook
---
apiVersion: batch/v1
kind: Job
metadata:
  name: signoz-alerting-provisioner
  namespace: signoz
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: signoz-alerting-provisioner
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: provision
          image: python:3.12-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: SIGNOZ_API
              value: http://signoz.signoz.svc.cluster.local:8080
            - name: SIGNOZ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: signoz-api-key
                  key: api_key
            - name: DISCORD_WEBHOOK
              valueFrom:
                secretKeyRef:
                  name: discord-webhook
                  key: webhook
          command:
            - python
            - -c
            - |
              import os, json, urllib.request, urllib.error
              API = os.environ["SIGNOZ_API"].rstrip("/")
              H = {"SIGNOZ-API-KEY": os.environ["SIGNOZ_API_KEY"], "Content-Type": "application/json"}
              WEBHOOK = os.environ["DISCORD_WEBHOOK"]
              PROVISIONER = "signoz-gitops-provisioner"

              def call(method, path, data=None):
                  body = json.dumps(data).encode() if data is not None else None
                  req = urllib.request.Request(API + path, data=body, headers=H, method=method)
                  try:
                      with urllib.request.urlopen(req, timeout=20) as r:
                          return r.status, r.read().decode()
                  except urllib.error.HTTPError as e:
                      return e.code, e.read().decode()

              channel = {
                  "name": "discord",
                  "slack_configs": [{
                      "send_resolved": True,
                      "api_url": WEBHOOK,
                      "channel": "#alerts",
                      "title": "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}",
                      "text": "{{ len .Alerts }} alert(s)\n{{ range .Alerts }}*{{ .Labels.severity }}* {{ .Annotations.summary }} —{{ range .Labels.SortedPairs }}{{ if and (ne .Name \"alertname\") (ne .Name \"severity\") (ne .Name \"ruleSource\") }} {{ .Name }}={{ .Value }}{{ end }}{{ end }}\n{{ end }}"
                  }]
              }
              _, body = call("GET", "/api/v1/channels")
              chans = json.loads(body).get("data") or []
              ex = next((c for c in chans if c.get("name") == "discord"), None)
              if ex:
                  cid = ex.get("id")
                  cs, rb = call("PUT", "/api/v1/channels/" + str(cid), channel)
                  print("channel updated:", cs, rb[:200])
              else:
                  cs, rb = call("POST", "/api/v1/channels", channel)
                  print("channel created:", cs, rb[:200])

              def rule(name, metric, tagg, sagg, op, target, sev, summary, desc, extra="", win="5m0s", freq="1m0s", absent=False, groupby=("k8s.cluster.name", "pool")):
                  expr = "k8s.cluster.name = 'affogato'" + (" AND " + extra if extra else "")
                  cond = {"compositeQuery": {"queryType": "builder", "panelType": "graph", "queries": [
                      {"type": "builder_query", "spec": {"name": "A", "signal": "metrics", "disabled": False,
                          "aggregations": [{"metricName": metric, "timeAggregation": tagg, "spaceAggregation": sagg}],
                          "filter": {"expression": expr}, "groupBy": [gbk(k) for k in groupby]}}]},
                      "op": op, "target": target, "matchType": "1", "selectedQueryName": "A"}
                  if absent:
                      cond["alertOnAbsent"] = True
                      cond["absentFor"] = 10
                  return {"version": "v5", "alert": name, "alertType": "METRIC_BASED_ALERT", "ruleType": "threshold_rule",
                          "evalWindow": win, "frequency": freq, "condition": cond,
                          "labels": {"severity": sev}, "annotations": {"summary": summary, "description": desc, "managed_by": PROVISIONER},
                          "preferredChannels": ["discord"]}

              def gbk(k):
                  return {"name": k}

              def krule(name, metric, tagg, sagg, op, target, sev, summary, desc, groupby, win="5m0s", freq="1m0s"):
                  return {"version": "v5", "alert": name, "alertType": "METRIC_BASED_ALERT", "ruleType": "threshold_rule",
                          "evalWindow": win, "frequency": freq,
                          "condition": {"compositeQuery": {"queryType": "builder", "panelType": "graph", "queries": [
                              {"type": "builder_query", "spec": {"name": "A", "signal": "metrics", "disabled": False,
                                  "aggregations": [{"metricName": metric, "timeAggregation": tagg, "spaceAggregation": sagg}],
                                  "filter": {"expression": ""}, "groupBy": [gbk(k) for k in groupby]}}]},
                              "op": op, "target": target, "matchType": "1", "selectedQueryName": "A"},
                          "labels": {"severity": sev}, "annotations": {"summary": summary, "description": desc, "managed_by": PROVISIONER},
                          "preferredChannels": ["discord"]}

              def grule(name, metric, tagg, sagg, op, target, sev, summary, desc, expr, groupby, win="5m0s", freq="1m0s", match="1"):
                  return {"version": "v5", "alert": name, "alertType": "METRIC_BASED_ALERT", "ruleType": "threshold_rule",
                          "evalWindow": win, "frequency": freq,
                          "condition": {"compositeQuery": {"queryType": "builder", "panelType": "graph", "queries": [
                              {"type": "builder_query", "spec": {"name": "A", "signal": "metrics", "disabled": False,
                                  "aggregations": [{"metricName": metric, "timeAggregation": tagg, "spaceAggregation": sagg}],
                                  "filter": {"expression": expr}, "groupBy": [gbk(k) for k in groupby]}}]},
                              "op": op, "target": target, "matchType": match, "selectedQueryName": "A"},
                          "labels": {"severity": sev}, "annotations": {"summary": summary, "description": desc, "managed_by": PROVISIONER},
                          "preferredChannels": ["discord"]}

              rules = [
                  grule("ArgoCD applications OutOfSync", "argocd_app_info", "count", "sum", ">", 0, "warning",
                        "ArgoCD has out-of-sync applications",
                        "One or more ArgoCD applications have been OutOfSync for over 10m (not a transient auto-sync).",
                        "sync_status = 'OutOfSync'", ["k8s.cluster.name", "name"], win="10m0s", freq="2m0s", match="2"),
                  grule("Ceph cluster not healthy", "ceph_health_status", "latest", "max", ">", 0, "warning",
                        "Ceph cluster is not HEALTH_OK",
                        "ceph_health_status > 0 on turing (1=HEALTH_WARN, 2=HEALTH_ERR).",
                        "k8s.cluster.name = 'turing'", ["k8s.cluster.name"], win="10m0s"),
                  grule("Ceph OSD down", "ceph_osd_up", "latest", "min", "<", 1, "critical",
                        "A Ceph OSD is down",
                        "At least one ceph_osd_up = 0 on turing.",
                        "k8s.cluster.name = 'turing'", ["k8s.cluster.name"]),
                  grule("Ceph mon quorum degraded", "ceph_mon_quorum_status", "latest", "sum", "<", 3, "critical",
                        "Ceph mon quorum degraded",
                        "Fewer than 3 mons in quorum on turing.",
                        "k8s.cluster.name = 'turing'", ["k8s.cluster.name"]),
                  grule("cert-manager certificate not ready", "certmanager_certificate_ready_status", "latest", "min", "<", 1, "warning",
                        "A cert-manager Certificate is not Ready",
                        "certmanager_certificate_ready_status{condition=True} < 1 (renewal failed or expired).",
                        "condition = 'True'", ["k8s.cluster.name", "namespace", "name"], win="15m0s", freq="5m0s"),
                  grule("Proxmox node down", "pve_up", "latest", "min", "<", 1, "critical",
                        "A Proxmox node is down",
                        "pve_up = 0 for a Proxmox node (id node/...).",
                        "k8s.cluster.name = 'proxmox-01' AND id LIKE 'node/%'", ["k8s.cluster.name", "id"]),
                  grule("Proxmox storage not available", "pve_up", "latest", "min", "<", 1, "warning",
                        "A Proxmox storage is not available",
                        "pve_up = 0 for a Proxmox storage (id storage/...).",
                        "k8s.cluster.name = 'proxmox-01' AND id LIKE 'storage/%'", ["k8s.cluster.name", "id"], win="10m0s", freq="5m0s"),
                  rule("Backup ZFS pool not healthy", "zfs_pool_health", "latest", "max", ">", 0, "critical",
                       "ZFS backup pool is not ONLINE",
                       "zfs_pool_health != 0 on affogato (0=ONLINE, 1=DEGRADED, 2=FAULTED, 3=OFFLINE, 4=UNAVAIL, 6=SUSPENDED)."),
                  rule("Backup ZFS pool low free space", "zfs_pool_free_bytes", "latest", "min", "<", 1500000000000, "warning",
                       "Backup pool low on free space",
                       "Less than ~1.5 TB free on the affogato ZFS pool.", freq="5m0s"),
                  rule("Backup ZFS pool high fragmentation", "zfs_pool_fragmentation_ratio", "latest", "max", ">", 60, "warning",
                       "Backup pool fragmentation high",
                       "ZFS pool fragmentation above 60% on affogato.", win="15m0s", freq="5m0s"),
                  rule("Backup server not reporting", "zfs_pool_size_bytes", "latest", "max", "<", 1, "critical",
                       "Backup server sent no metrics",
                       "No ZFS metrics received from affogato for 10m (collector or server down).", win="10m0s", freq="5m0s", absent=True),
                  krule("Kubernetes node not ready", "k8s.node.condition_ready", "latest", "min", "<", 1, "critical",
                        "A Kubernetes node is not Ready",
                        "k8s.node.condition_ready < 1 (node NotReady or Unknown).", ["k8s.cluster.name", "k8s.node.name"]),
                  krule("Kubernetes node memory pressure", "k8s.node.condition_memory_pressure", "latest", "max", ">", 0, "warning",
                        "Kubernetes node under memory pressure",
                        "k8s.node.condition_memory_pressure is active.", ["k8s.cluster.name", "k8s.node.name"]),
                  krule("Kubernetes node disk pressure", "k8s.node.condition_disk_pressure", "latest", "max", ">", 0, "warning",
                        "Kubernetes node under disk pressure",
                        "k8s.node.condition_disk_pressure is active.", ["k8s.cluster.name", "k8s.node.name"]),
                  krule("Kubernetes container restarting", "k8s.container.restarts", "increase", "max", ">", 3, "warning",
                        "Container restarting frequently",
                        "More than 3 restarts over 15m (possible CrashLoopBackOff).",
                        ["k8s.cluster.name", "k8s.pod.name", "k8s.container.name"], win="15m0s", freq="5m0s"),
                  krule("Kubernetes container OOMKilled", "container_oom_events_total", "increase", "max", ">", 0, "critical",
                        "A container was OOMKilled",
                        "container_oom_events_total increased: a container hit its memory limit and was OOM-killed (cAdvisor).",
                        ["k8s.cluster.name", "namespace", "pod", "container"], win="5m0s", freq="1m0s"),
              ]
              def field(r, k):
                  return r.get(k) if r.get(k) is not None else (r.get("data") or {}).get(k)

              _, rbody = call("GET", "/api/v1/rules")
              current = json.loads(rbody).get("data", {}).get("rules") or []
              existing = {field(r, "alert"): r.get("id") for r in current}
              desired = {r["alert"] for r in rules}
              for rule in rules:
                  rid = existing.get(rule["alert"])
                  if rid:
                      rs, rr = call("PUT", "/api/v1/rules/" + str(rid), rule)
                      print("rule updated:", rule["alert"], rs, rr[:200])
                  else:
                      rs, rr = call("POST", "/api/v1/rules", rule)
                      print("rule created:", rule["alert"], rs, rr[:200])
              for r in current:
                  title = field(r, "alert")
                  ann = field(r, "annotations") or {}
                  if ann.get("managed_by") == PROVISIONER and title not in desired:
                      ds, dr = call("DELETE", "/api/v1/rules/" + str(r.get("id")))
                      print("rule deleted (orphan):", title, ds, dr[:120])
              raise SystemExit(0 if cs < 300 else 1)
