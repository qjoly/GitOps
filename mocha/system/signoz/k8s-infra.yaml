apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: signoz-k8s-infra
  namespace: argocd
spec:
  project: default
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/audit: privileged
        pod-security.kubernetes.io/warn: privileged
  destination:
    server: https://kubernetes.default.svc
    namespace: signoz-k8s-infra
  source:
    repoURL: https://charts.signoz.io
    chart: k8s-infra
    targetRevision: 0.16.0
    helm:
      values: |
        # Identifie l'origine de toute la télémétrie : ajoute l'attribut de
        # ressource k8s.cluster.name=mocha sur metrics/logs/events/traces.
        # Indispensable car plusieurs clusters enverront vers ce même SigNoz.
        global:
          clusterName: mocha
          deploymentEnvironment: production
        # Collecteur SignOz interne (même cluster). L'agent exporte en OTLP/HTTP
        # (exporter otlphttp) : URL avec schéma http:// et port OTLP-HTTP 4318.
        otelCollectorEndpoint: http://signoz-otel-collector.signoz.svc.cluster.local:4318
        otelInsecure: true
        # Presets activés par défaut : logsCollection, hostMetrics,
        # kubeletMetrics, clusterMetrics, kubernetesAttributes, k8sEvents.
        presets:
          otlpExporter:
            enabled: true
          loggingExporter:
            enabled: false
