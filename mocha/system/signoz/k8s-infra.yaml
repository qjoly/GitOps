apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: signoz-k8s-infra
  namespace: argocd
spec:
  project: default
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/audit: privileged
        pod-security.kubernetes.io/warn: privileged
  destination:
    server: https://kubernetes.default.svc
    namespace: signoz-k8s-infra
  source:
    repoURL: https://charts.signoz.io
    chart: k8s-infra
    targetRevision: 0.16.0
    helm:
      values: |
        global:
          clusterName: mocha
          deploymentEnvironment: production
        otelCollectorEndpoint: http://signoz-otel-collector.signoz.svc.cluster.local:4318
        otelInsecure: true
        presets:
          otlpExporter:
            enabled: true
          loggingExporter:
            enabled: false
        otelAgent:
          config:
            receivers:
              prometheus:
                config:
                  scrape_configs:
                    - job_name: cadvisor-oom
                      scheme: https
                      scrape_interval: 30s
                      metrics_path: /metrics/cadvisor
                      authorization:
                        credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                      tls_config:
                        insecure_skip_verify: true
                      static_configs:
                        - targets:
                            - ${env:K8S_HOST_IP}:10250
                      metric_relabel_configs:
                        - source_labels: [__name__]
                          regex: container_oom_events_total
                          action: keep
                        - source_labels: [pod]
                          regex: .+
                          action: keep
            processors:
              resource/cluster:
                attributes:
                  - key: k8s.cluster.name
                    value: mocha
                    action: upsert
            service:
              pipelines:
                metrics/cadvisor:
                  receivers:
                    - prometheus
                  processors:
                    - resource/cluster
                    - batch
                  exporters:
                    - otlphttp
        otelDeployment:
          config:
            receivers:
              prometheus:
                config:
                  scrape_configs:
                    - job_name: argocd
                      scrape_interval: 30s
                      static_configs:
                        - targets:
                            - argocd-metrics.argocd.svc.cluster.local:8082
                            - argocd-server-metrics.argocd.svc.cluster.local:8083
                    - job_name: plex
                      scrape_interval: 30s
                      static_configs:
                        - targets:
                            - plex-exporter.plex-exporter.svc.cluster.local:9000
            processors:
              resource/cluster:
                attributes:
                  - key: k8s.cluster.name
                    value: mocha
                    action: upsert
            service:
              pipelines:
                metrics/argocd:
                  receivers:
                    - prometheus
                  processors:
                    - resource/cluster
                    - batch
                  exporters:
                    - otlphttp
