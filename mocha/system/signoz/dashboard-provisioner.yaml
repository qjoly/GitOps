---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: signoz-api-key
  namespace: signoz
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: signoz-api-key
  data:
    - secretKey: api_key
      remoteRef:
        key: signoz
        property: api_key
---
apiVersion: batch/v1
kind: Job
metadata:
  name: signoz-dashboard-import
  namespace: signoz
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: signoz-dashboard-import
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: import
          image: python:3.14-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: SIGNOZ_API
              value: http://signoz.signoz.svc.cluster.local:8080
            - name: SIGNOZ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: signoz-api-key
                  key: api_key
          volumeMounts:
            - name: dashboards
              mountPath: /dashboards
              readOnly: true
          command:
            - python
            - -c
            - |
              import os, json, glob, urllib.request, urllib.error
              API = os.environ["SIGNOZ_API"].rstrip("/")
              KEY = os.environ["SIGNOZ_API_KEY"]
              H = {"SIGNOZ-API-KEY": KEY, "Content-Type": "application/json"}

              def call(method, path, data=None):
                  body = json.dumps(data).encode() if data is not None else None
                  req = urllib.request.Request(API + path, data=body, headers=H, method=method)
                  try:
                      with urllib.request.urlopen(req, timeout=20) as r:
                          return r.status, r.read().decode()
                  except urllib.error.HTTPError as e:
                      return e.code, e.read().decode()

              _, body = call("GET", "/api/v1/dashboards")
              existing = {}
              for d in (json.loads(body).get("data") or []):
                  t = (d.get("data") or {}).get("title")
                  uid = d.get("id") or d.get("uuid")
                  if t:
                      existing[t] = uid
              print("existing dashboards:", len(existing))

              created = updated = failed = 0
              for f in sorted(glob.glob("/dashboards/*.json")):
                  dash = json.load(open(f))
                  title = dash.get("title") or os.path.basename(f)
                  if title in existing:
                      uid = existing[title]
                      st, rb = call("PUT", "/api/v1/dashboards/" + uid, dash)
                      if st < 300:
                          print("updated:", title, st); updated += 1; continue
                      dl, _ = call("DELETE", "/api/v1/dashboards/" + uid)
                      st, rb = call("POST", "/api/v1/dashboards", dash)
                      if st < 300:
                          print("recreated:", title, st); updated += 1
                      else:
                          print("ERROR:", title, st, rb[:300]); failed += 1
                  else:
                      st, rb = call("POST", "/api/v1/dashboards", dash)
                      if st < 300:
                          print("created:", title, st); created += 1
                      else:
                          print("ERROR:", title, st, rb[:300]); failed += 1
              print(f"done: created={created} updated={updated} failed={failed}")
              raise SystemExit(1 if failed else 0)
      volumes:
        - name: dashboards
          configMap:
            name: signoz-dashboards
