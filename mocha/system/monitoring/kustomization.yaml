---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - loki-stack.yaml
  - grafana.yaml
  - middleware.yaml
configMapGenerator:
  - name: grafana-dashboard-k8s-clickhouse
    namespace: monitoring
    files:
      - dashboards/k8s-clickhouse.json
  - name: grafana-dashboard-rook-ceph-clickhouse
    namespace: monitoring
    files:
      - dashboards/rook-ceph-clickhouse.json
  - name: grafana-dashboard-traefik-clickhouse
    namespace: monitoring
    files:
      - dashboards/traefik-clickhouse.json
  - name: grafana-dashboard-argocd-clickhouse
    namespace: monitoring
    files:
      - dashboards/argocd-clickhouse.json
  - name: grafana-dashboard-cert-manager-clickhouse
    namespace: monitoring
    files:
      - dashboards/cert-manager-clickhouse.json
generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: "1"
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true
