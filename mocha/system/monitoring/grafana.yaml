apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: 10.5.8
    helm:
      values: |
        adminUser: <path:kv/grafana#user>
        adminPassword: <path:kv/grafana#pass>
        plugins:
          - chaosmeshorg-datasource
          - grafana-clickhouse-datasource
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              # ponytail: schéma SigNoz (signoz_traces/signoz_logs/signoz_metrics), PAS le
              # schéma OTel standard attendu par le plugin → otel désactivé, on requête au
              # query builder SQL. Activer le mode OTel casserait (colonnes différentes).
              - name: SigNoz ClickHouse
                type: grafana-clickhouse-datasource
                access: proxy
                jsonData:
                  host: signoz-clickhouse.signoz.svc.cluster.local
                  port: 9000
                  protocol: native
                  secure: false
                  username: admin
                secureJsonData:
                  password: <path:kv/signoz-clickhouse#password>
        ingress:
          enabled: true
          ingressClassName: traefik
          annotations:
            cert-manager.io/cluster-issuer: cloudflare
          hosts:
            - "grafana.<path:kv/cluster#domain>"
          tls:
            - secretName: grafana-tls
              hosts:
                - "grafana.<path:kv/cluster#domain>"
        persistence:
          type: pvc
          enabled: true
        assertNoLeakedSecrets: false
        grafana.ini:
            server:
              root_url: https://grafana.<path:kv/cluster#domain>
            auth:
                signout_redirect_url: "https://oidc.home.une-tasse-de.cafe/application/o/<path:kv/grafana#authentik_app>/end-session/"
                oauth_auto_login: false
            auth.generic_oauth:
                name: authentik
                enabled: true
                client_id: <path:kv/grafana#authentik_id>
                client_secret: <path:kv/grafana#authentik_secret>
                scopes: "openid profile email"
                auth_url: "https://oidc.home.une-tasse-de.cafe/application/o/authorize/"
                token_url: "https://oidc.home.une-tasse-de.cafe/application/o/token/"
                api_url: "https://oidc.home.une-tasse-de.cafe/application/o/userinfo/"
                # Optionally map user groups to Grafana roles
                # role_attribute_path: contains(groups, 'Grafana Admins') && 'Admin' || contains(groups, 'Grafana Editors') && 'Editor' || 'Viewer'
        sidecar:
          datasources:
            enabled: true
        serviceMonitor:
          enabled: false
