apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: matomo
  namespace: argocd
spec:
  project: default
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  destination:
    server: https://kubernetes.default.svc
    namespace: matomo
  source:
    repoURL: https://github.com/qjoly/gitops.git
    targetRevision: HEAD
    path: mocha/apps/matomo/manifests
