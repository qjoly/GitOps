apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: mocha-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/qjoly/gitops.git
        revision: HEAD
        directories:
          - path: mocha/apps/*
  template:
    metadata:
      name: "app-{{.path.basename}}"
    spec:
      project: "default"
      source:
        repoURL: https://github.com/qjoly/gitops.git
        targetRevision: HEAD
        path: "{{.path.path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "argocd"
      syncPolicy:
        automated:
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
      ignoreDifferences:
        - group: argoproj.io
          kind: Application
          jsonPointers:
            - /metadata/finalizers
